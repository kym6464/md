name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} -m "v%s"
          echo "tag=v$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Push
        run: git push --follow-tags

  build:
    needs: version
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            os: ubuntu-latest
          - target: bun-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            os: macos-latest
          - target: bun-windows-x64
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build
        run: bun build ./bin/index.js --compile --target=${{ matrix.target }} --outfile dist/md-${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Repackage for Homebrew
        run: |
          cd dist
          VERSION="${{ needs.version.outputs.tag }}"
          VERSION="${VERSION#v}"
          for f in md-bun-darwin-* md-bun-linux-*; do
            TARGET="${f#md-bun-}"
            TARGET="${TARGET/x64/amd64}"
            mv "$f" md
            chmod +x md
            tar czf "md-${VERSION}-${TARGET}.tar.gz" md
            rm md
          done

      - name: Create release
        env:
          # GITHUB_TOKEN events don't trigger other workflows; use a PAT so the
          # release event triggers the homebrew.yml workflow.
          GH_TOKEN: ${{ secrets.HOMEBREW_PAT }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${{ needs.version.outputs.tag }}" dist/* --title "${{ needs.version.outputs.tag }}" --generate-notes
